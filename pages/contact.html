<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Just Nature - Contact</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/index.js"></script>
  </head>
  <body>
    <div id="layout-container"></div>

    <div class="cards-container">
      <div class="card">
        <img src="/images/orchid.jpg" alt="Salon Image" class="card-image" />

        <div class="card-buttons">
          <button class="book-btn" onclick="toggleContainer('form', 'block')">
            Schedule an Appointment
          </button>
          <div class="card-details" id="form" style="display: none">
            <iframe
              class="card-details"
              src="https://docs.google.com/forms/d/e/1FAIpQLSdgc_hEFrRXkOyQR_BBGJxyUPqQUhDXASdue29OvxokZqNarQ/viewform?embedded=true"
              width="640"
              height="1708"
              frameborder="0"
              marginheight="0"
              marginwidth="0"
              >Loading…</iframe
            >
          </div>
        </div>

        <div class="card-deatils" id="form" style="display: none">
          <iframe
            src="https://docs.google.com/forms/d/e/1FAIpQLSdgc_hEFrRXkOyQR_BBGJxyUPqQUhDXASdue29OvxokZqNarQ/viewform?embedded=true"
            width="640"
            height="1843"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            >Loading…</iframe
          >
        </div>

        <div class="card-details">
          <h1>Hours of Operation</h1>
          <p>Sunday Closed</p>
          <p>Monday 9am - 5pm</p>
          <p>Tuesday 9am - 5pm</p>
          <p>Wednesday 9am - 5pm</p>
          <p>Thursday 9am - 5pm</p>
          <p>Friday 9am - 5pm</p>
          <p>Saturday 9am - 5pm</p>
        </div>

        <div class="card-details">
          <h1>Contact Us</h1>
          <p>626-446-6788</p>
          <p>justnatureusa@gmail.com</p>
          <p></p>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", loadLayout);
    </script>
  </body>
</html>
