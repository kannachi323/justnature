<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles.css" />
    <title>Just Nature - Gallery</title>
  </head>
  <body>
    <div id="layout-container"></div>

    <div class="btn-container">
      <button
        class="gallery-btn container"
        onclick="toggleContainer('ic1', 'flex')"
      >
        Orchids
      </button>
    </div>

    <div class="img-container" id="ic1" style="display: none"></div>

    <div class="img-container" id="ic2" style="display: none"></div>

    <div class="btn-container">
      <button
        class="gallery-btn container"
        onclick="toggleContainer('ic2', 'flex')"
      >
        Landscaping
      </button>
    </div>
    
    <script type="module">
      import { toggleContainer } from '/index.js';
      window.toggleContainer = toggleContainer;
    </script>
  </body>
</html>
