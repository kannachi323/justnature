    <link rel="stylesheet" href="../styles.css" />
    <title>Just Nature - Gallery</title>
  </head>
  <body>
    <div id="layout-container"></div>

    <div class="btn-container">

    <div class="img-container" id="ic2" style="display: flex"></div>

    <div class="btn-container">
      <button
        class="gallery-btn container"
        onclick="toggleContainer('ic2', 'flex')"

        Landscaping
      </button>
    </div>

    <div class="img-container" id="ic3" style="display: flex">
      <img class="img-item" src="/images/IMG_4777.jpg" alt="some orchids" />
      <img class="img-item" src="/images/IMG_5247.jpg" alt="some orchids" />
      <img class="img-item" src="/images/IMG_5789.jpg" alt="some orchids" />
      <img class="img-item" src="/images/IMG_5790.jpg" alt="some orchids" />
      <img class="img-item" src="/images/IMG_6052.jpg" alt="some orchids" />
      <img class="img-item" src="/images/IMG_6086.jpg" alt="some orchids" />
    </div>

    <script src="/index.js" type="module"></script>

</html>
